version: "3.9"

services:
  db:
    image: postgres:16
    container_name: trackforge_db
    environment:
      POSTGRES_USER: trackforge
      POSTGRES_PASSWORD: trackforge123
      POSTGRES_DB: trackforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: trackforge_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trackforge.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: