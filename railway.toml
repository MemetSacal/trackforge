[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[build.nixpacksPlan.phases.install]
cmds = ["pip install -r backend/requirements.txt --break-system-packages"]

[deploy]
startCommand = "python -m alembic -c backend/alembic.ini upgrade head && python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"